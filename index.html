<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Card Generator</title>
   <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"> -->
    <link rel="stylesheet" href="style.css">

   
</head>
<body>

    <div class="mainWrapper">

        <h1 class="pageHeading">
            Student Card Generator
        </h1>

        <div class="contentArea">

            <!-- Form -->

            <div class="formBox">

                <h2>Student Form</h2>

                <div class="mb-3">
                  <label for="disabledTextInput" class="form-label"> <b>Enter your full name </b></label>
                <input  type="text"    placeholder="Enter Full Name"   class="studentNameInput">

                </div>

                

                <div class="mb-3">
                <label for="disabledTextInput" class="form-label"> <b>Enter your cnic </b></label>
                <input type="text" placeholder="Enter CNIC" class="studentCnicInput">

                </div>

                 <div class="mb-3">
                 
                   <label for="disabledSelect" class="form-label"> <b>Select your campus</b></label>
                        <select class="studentCourseSelect">
                    <option>Select your course</option>
                    <option>Web Development</option>
                    <option>Graphic Designing</option>
                    <option>AI & Data Science</option>
                </select>
                </div>


                <div class="mb-3">
                    <label for="disabledSelect" class="form-label"><b>Select your campus</b></label>
                <select class="studentCampusSelect">
                    <option>Select your campus</option>
                    <option>Bahadurabad  Campus</option>
                    <option>Gulshan Campus</option>
                      <option>Zamzama Campus</option>
                    <option>Zaitoon Ashraf IT park Campus</option>
                </select>
                </div>

                <input  type="file" class="studentImageInput" >

                <button onclick="createStudentCard()"> Generate ID Card
                </button>

            </div>

            <!-- Card -->

            <div id="studentCardContainer"></div>

        </div>

    </div>
 
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>

</body>
</html>
