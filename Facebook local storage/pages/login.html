<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login Page</title>
    <link rel="stylesheet" href="../Styles/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <!-- Left Box for logo and text -->
        <div class="leftBox">
            <img src="../Images/fb-logo name.svg" alt="This is a Facebook Logo." width="200px">
            <p>Facebook helps you connect and share with the people in your life.</p>
        </div>

        <!-- Login Form -->
        <div class="rightBox">
            <div class="inputEmail">
                <input type="email" required placeholder="Enter Your Email here..." id="inputEmail">
            </div>
            <div class="inputPassword">
                <input type="password" id="inputPassword" required placeholder="Enter Your Password here...">
                <i class="fa-solid fa-eye" onclick="toggleEye()"></i>
                <!-- <i class="fa-solid fa-eye-slash hidden"></i> -->
            </div>

            <div class="loginBtn">
                <a href="Javascript:void(0)"  onclick="loginHandler()">
                    <button >Log in</button>
                </a>
            </div>

            <a href=""><p>Forgotten password?</p></a>

            <hr >

            <div class="registerBtn">
                <a href="signup.html">
                    <button>Create new account</button>
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../Js/login.js"></script>
</body>
</html>
